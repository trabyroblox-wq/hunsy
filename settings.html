<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings ⚙</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  padding: 40px;
}

.cloak-option {
  background: #1a1a1a;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  transition: 0.2s;
}

.cloak-option:hover {
  background: #222;
}

.cloak-option img {
  width: 24px;
  height: 24px;
  margin-right: 10px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  color: white;
  background: linear-gradient(90deg, #b784ff, #8b008b);
}
</style>
</head>

<body>

<h1>Settings ⚙</h1>
<a href="index.html">⬅ Back Home</a>

<h2>Tab Cloaking</h2>
<div id="cloakList"></div>

<button onclick="resetCloak()">Reset Cloak</button>

<script src="settings.js"></script>
</body>
</html>
