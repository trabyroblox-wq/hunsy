<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hunsy 🐻</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>

<body class="dark purpleBlack">

<!-- ================= PASSWORD OVERLAY ================= -->
<div id="pwOverlay" style="position:fixed;inset:0;background:#0b0b0b;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;">
  <h2>You Found the Site… Now Find the Password 🐻</h2>
  <input type="password" id="pwInput" placeholder="Password">
  <button id="pwSubmit">Submit</button>
  <div id="pwError" style="display:none;color:red;">Incorrect password!</div>
</div>

<!-- ================= HEADER ================= -->
<header class="top">
  <h1>Hunsy 🐻</h1>
  <nav class="nav">
    <a href="index.html">🏠 Home</a>
    <a href="music.html">🎵 BG Music</a>
  </nav>
</header>

<!-- ================= SEARCH ================= -->
<input id="search" placeholder="Search games… (Press K)" />

<!-- ================= GAME GRID ================= -->
<main id="gameGrid"></main>

<!-- ================= SETTINGS BUTTON ================= -->
<button id="settingsBtn" class="floating-btn">⚙</button>

<!-- ================= SETTINGS PANEL ================= -->
<div id="settingsPanel">
  <h2>Settings</h2>

  <label>
    Mode:
    <select id="modeSelect">
      <option value="dark" selected>Dark</option>
      <option value="normal">Normal</option>
    </select>
  </label>

  <label>
    Theme:
    <select id="themeSelect">
      <option value="purpleBlack" selected>Purple & Black</option>
      <option value="blueBlack">Blue & Black</option>
      <option value="redBlack">Red & Black</option>
      <option value="greenBlack">Green & Black</option>
    </select>
  </label>

  <label>
    <input type="checkbox" id="showNamesToggle" checked>
    Show Game Names
  </label>

  <button id="funButton">🎉 Surprise!</button>
  <button id="closeSettings">✖ Close</button>
</div>

<!-- ================= MAIN SCRIPT ================= -->
<script src="script.js"></script>

<!-- ================= SEARCH + K HOTKEY (WORKING) ================= -->
<script>
const searchInput = document.getElementById("search");

/* SEARCH FILTER */
searchInput.addEventListener("input", () => {
  const query = searchInput.value.toLowerCase();
  document.querySelectorAll(".gameCard").forEach(card => {
    const name = card.dataset.name || card.innerText.toLowerCase();
    card.style.display = name.includes(query) ? "" : "none";
  });
});

/* K HOTKEY */
document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "k" && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});
</script>

<!-- ================= PASSWORD SCRIPT ================= -->
<script>
const PASSWORD = "doodledoodlepencilfart";
const pwOverlay = document.getElementById("pwOverlay");
const pwInput = document.getElementById("pwInput");
const pwSubmit = document.getElementById("pwSubmit");
const pwError = document.getElementById("pwError");

if (localStorage.getItem("hunsyPassword") === PASSWORD) {
  pwOverlay.style.display = "none";
}

pwSubmit.onclick = () => {
  if (pwInput.value === PASSWORD) {
    localStorage.setItem("hunsyPassword", PASSWORD);
    pwOverlay.style.display = "none";
  } else {
    pwError.style.display = "block";
  }
};

pwInput.addEventListener("keydown", e => {
  if (e.key === "Enter") pwSubmit.click();
});
</script>

</body>
</html>
