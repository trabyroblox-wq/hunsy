<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hunsy 🐻</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body class="dark purpleBlack" id="mainBody">
 <img src="assets/hunsy.png" alt="Hunsy Logo" class="hunsy-logo">

  <!-- Password Overlay -->
  <div
    id="pwOverlay"
    style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0b0b;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
    "
  >
    <h2>You Found the Site Now Found the Password 😂🐻</h2>

    <input
      type="password"
      id="pwInput"
      placeholder="Password"
      style="
        padding: 10px 15px;
        border-radius: 8px;
        border: none;
        margin-top: 10px;
        font-size: 16px;
      "
    >

    <button
      id="pwSubmit"
      style="
        margin-top: 10px;
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        background: #b784ff;
        color: #0b0b0b;
        font-weight: bold;
        cursor: pointer;
      "
    >
      Submit
    </button>

    <div
      id="pwError"
      style="margin-top: 10px; color: red; display: none;"
    >
      Incorrect password!
    </div>
  </div>

  <!-- Header -->
  <header class="top">
    <h1>Hunsy 🐻</h1>

    <!-- NAV BAR -->
    <nav class="nav">
      <a href="index.html">🏠 Home</a>
      <a href="swf.html">💻 SWF Emulator</a>
      <a href="settings.html">⚙️ Settings</a>
      <a href="proxy/index.html">🌐 Proxy</a>
    </nav>

    <input id="search" placeholder="Search games..." />
  </header>

<img src="assets/bear3.png" alt="Bear" class="bear-under-header">
  <!-- Game grid -->
  <main id="gameGrid"></main>

  <!-- Scripts -->
  <script src="script.js"></script>

  <!-- Load Custom Background -->
  <script>
    const savedBg = localStorage.getItem("hunsyBackground");
    if (savedBg) {
      document.getElementById("mainBody").style.backgroundImage = `url('${savedBg}')`;
      document.getElementById("mainBody").style.backgroundSize = "cover";
      document.getElementById("mainBody").style.backgroundPosition = "center";
      document.getElementById("mainBody").style.backgroundAttachment = "fixed";
    }
  </script>

  <!-- Password System -->
  <script>
    const PASSWORD = "doodledoodlepencilfart";

    const pwOverlay = document.getElementById("pwOverlay");
    const pwInput = document.getElementById("pwInput");
    const pwSubmit = document.getElementById("pwSubmit");
    const pwError = document.getElementById("pwError");

    if (localStorage.getItem("hunsyPassword") === PASSWORD) {
      pwOverlay.style.display = "none";
    }

    pwSubmit.addEventListener("click", () => {
      if (pwInput.value === PASSWORD) {
        localStorage.setItem("hunsyPassword", PASSWORD);
        pwOverlay.style.display = "none";
      } else {
        pwError.style.display = "block";
      }
    });

    pwInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") pwSubmit.click();
    });
  </script>



</body>
</html>
